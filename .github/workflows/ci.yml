# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  NEXT_PUBLIC_POCKETBASE_URL: https://micka.lhstudio.com.ar
  NEXT_PUBLIC_SITE_URL: https://micka-plum.vercel.app

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test
      - run: npx next build

  e2e:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Check secrets
        id: gate
        env:
          PB_EMAIL: ${{ secrets.POCKETBASE_ADMIN_EMAIL }}
          PB_PASSWORD: ${{ secrets.POCKETBASE_ADMIN_PASSWORD }}
        run: |
          if [ -n "$PB_EMAIL" ] && [ -n "$PB_PASSWORD" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E skipped - POCKETBASE_* secrets not configured in repo settings"
          fi
      - if: steps.gate.outputs.run == 'true'
        run: npm ci
      - if: steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.gate.outputs.run == 'true'
        env:
          POCKETBASE_ADMIN_EMAIL: ${{ secrets.POCKETBASE_ADMIN_EMAIL }}
          POCKETBASE_ADMIN_PASSWORD: ${{ secrets.POCKETBASE_ADMIN_PASSWORD }}
        run: npx playwright test
      - if: steps.gate.outputs.run == 'true' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
